{% extends "base.html" %}

{% block title %}Server Error - MindEase{% endblock %}

{% block content %}
<div class="container" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div style="text-align: center; max-width: 500px;">
        <div style="font-size: 120px; margin-bottom: 20px;">⚠️</div>
        <h1 style="font-size: 48px; margin-bottom: 16px; color: var(--text-dark);">500</h1>
        <h2 style="font-size: 24px; margin-bottom: 16px; color: var(--text-light);">Server Error</h2>
        <p style="color: var(--text-light); margin-bottom: 30px;">
            Something went wrong on our end. Please try again later.
        </p>
        <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('index') }}" 
           class="btn-primary" 
           style="display: inline-block; padding: 14px 28px; text-decoration: none;">
            {% if current_user.is_authenticated %}
                Go to Dashboard
            {% else %}
                Go to Home
            {% endif %}
        </a>
    </div>
</div>
{% endblock %}
